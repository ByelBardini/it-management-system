  <!-- Glyph de camadas (inventário), centrado dentro da zona segura (~60%). -->
  <g fill="none" stroke="#38bdf8" stroke-width="22" stroke-linejoin="round" stroke-linecap="round">
    <path d="M256 150 L360 202 L256 254 L152 202 Z" />
    <path d="M152 256 L256 308 L360 256" />
    <path d="M152 310 L256 362 L360 310" />
  </g>
</svg>

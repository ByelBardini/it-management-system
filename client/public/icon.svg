<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="InfraHub">
  <!-- Fundo full-bleed (sem cantos transparentes) para ficar seguro como ícone
       maskable no Android. O sistema aplica a própria máscara. Tema "glass" escuro. -->
